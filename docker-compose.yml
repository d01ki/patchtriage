# Reproducible entry points for reviewers. Everything runs in a container;
# nothing but Docker is required on the host.
#
#   docker compose run --rm demo         # offline demo -> ./out/demo_report.html
#   docker compose run --rm start        # interactive guided run (asks questions)
#   docker compose run --rm triage run /work/sbom.json \
#       -o /out/report.json --html /out/report.html
#
# Put your scans / SBOMs anywhere under this directory; they appear at /work
# inside the container. Reports written to /out land in ./out on the host.
# The triage/start services read ANTHROPIC_API_KEY, NVD_API_KEY, and
# GITHUB_TOKEN/GH_TOKEN from your shell environment (all optional).

services:
  # Web GUI console: register targets, import scans/SBOMs, browse reports.
  #   docker compose up gui   ->   open http://localhost:8765
  # Each browser gets an isolated anonymous workspace. Targets, uploaded
  # evidence, and reports live in the named 'config' volume for six hours.
  gui:
    build: .
    ports:
      - "${PATCHTRIAGE_BIND:-127.0.0.1}:${PATCHTRIAGE_PORT:-8765}:8765"
    environment:
      - ANTHROPIC_API_KEY
      - NVD_API_KEY
      - GITHUB_TOKEN
      - GH_TOKEN
      - PATCHTRIAGE_DEPLOYMENT_MODE=${PATCHTRIAGE_DEPLOYMENT_MODE:-local}
      - PATCHTRIAGE_ALLOW_GENERIC_REPOSITORIES=${PATCHTRIAGE_ALLOW_GENERIC_REPOSITORIES:-true}
      - PATCHTRIAGE_COOKIE_SECURE=${PATCHTRIAGE_COOKIE_SECURE:-auto}
      - PATCHTRIAGE_BUILD_SHA=${PATCHTRIAGE_BUILD_SHA:-development}
    volumes:
      - cache:/home/patchtriage/.cache
      - config:/home/patchtriage/.config
    entrypoint: ["patchtriage"]
    command: ["serve", "--host", "0.0.0.0", "--no-browser"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8765/api/config',timeout=3).status==200 else 1)"]
      interval: 10s
      timeout: 4s
      retries: 5
      start_period: 3s

  # Offline demo: no network, no keys.
  demo:
    build: .
    volumes:
      - ./out:/out

  # Interactive guided run. `run` (not `-d`) keeps stdin/tty attached so the
  # wizard can ask its questions; the browser step is auto-skipped in the
  # container and the report path under ./out is printed instead.
  start:
    build: .
    stdin_open: true
    tty: true
    environment:
      - ANTHROPIC_API_KEY
      - NVD_API_KEY
      - GITHUB_TOKEN
      - GH_TOKEN
      - PATCHTRIAGE_IN_CONTAINER=1
    volumes:
      - ./:/work
      - ./out:/out
      - cache:/home/patchtriage/.cache
    working_dir: /work
    entrypoint: ["patchtriage"]
    command: ["start"]

  # Scriptable triage: pass any `run ...` arguments after the service name.
  triage:
    build: .
    environment:
      - ANTHROPIC_API_KEY
      - NVD_API_KEY
      - GITHUB_TOKEN
      - GH_TOKEN
      - PATCHTRIAGE_IN_CONTAINER=1
    volumes:
      - ./:/work
      - ./out:/out
      - cache:/home/patchtriage/.cache
    working_dir: /work
    entrypoint: ["patchtriage"]
    command: ["--help"]

volumes:
  cache:
  config:
