name: Deploy PatchTriage

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: patchtriage-production
  cancel-in-progress: true

jobs:
  verify:
    name: verify deploy candidate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Unit and reviewer validation
        run: |
          python -m pytest -q -m "not network"
          patchtriage verify --repeats 25 --output verification_report.json

  deploy:
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Lightsail
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          port: ${{ secrets.LIGHTSAIL_PORT }}
          script: |
            PATCHTRIAGE_DEPLOYMENT_MODE=public \
            PATCHTRIAGE_ALLOW_GENERIC_REPOSITORIES=false \
            PATCHTRIAGE_COOKIE_SECURE=true \
            PATCHTRIAGE_BUILD_SHA=${{ github.sha }} \
            /usr/local/bin/deploy-patchtriage
      - name: Verify deployed build and API
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          curl --fail --retry 12 --retry-delay 5 --retry-all-errors \
            https://patch-triage.com/api/config -o deployed-config.json
          python -c "import json,os; c=json.load(open('deployed-config.json')); assert c['build_sha']==os.environ['EXPECTED_SHA']; assert c['deployment_mode']=='public'; assert c['repository_import']['generic_https_git']=='unavailable'"
