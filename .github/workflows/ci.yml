name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Unit tests
        run: python -m pytest tests -q

  demo:
    name: offline demo (no network, no keys)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e .
      - name: Run demo end-to-end
        run: |
          patchtriage demo --html demo_report.html --output demo_report.json
          test -s demo_report.html
          python -c "import json; r=json.load(open('demo_report.json')); assert r['findings'] and r['actions'] and r['evaluation']"
      - uses: actions/upload-artifact@v4
        with:
          name: demo-report
          path: |
            demo_report.html
            demo_report.json

  docker:
    name: docker build + demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t patchtriage .
      - name: Run containerized demo
        run: |
          mkdir -p out && chmod 777 out
          docker run --rm -v "$PWD/out:/out" patchtriage
          test -s out/demo_report.html
