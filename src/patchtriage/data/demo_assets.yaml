# Asset inventory: teaches PatchTriage about YOUR environment.
# First matching rule wins (glob patterns against asset identifier).
assets:
  - match: "web-frontend*"
    criticality: critical
    internet_exposed: true
    system_exposure: open
    mission_impact: mef_failure
    safety_impact: critical
    owner: platform-team
    notes: customer-facing checkout
  - match: "batch-*"
    criticality: low
    internet_exposed: false
    system_exposure: controlled
    mission_impact: degraded
    safety_impact: negligible
  - match: "*"
    criticality: medium
    internet_exposed: false
    system_exposure: controlled
    mission_impact: degraded
    safety_impact: negligible
